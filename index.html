<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Club Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-gray: #8e8e93;
            --accent-blue: #007aff;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* Шапка с навигацией */
        .nav-tabs { 
            display: flex; 
            gap: 8px; 
            padding: 15px; 
            overflow-x: auto; 
            position: sticky; 
            top: 0; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(15px); 
            z-index: 100; 
            scrollbar-width: none; 
        }
        .nav-tabs::-webkit-scrollbar { display: none; }
        
        .tab { 
            background: #1c1c1e; 
            padding: 10px 18px; 
            border-radius: 22px; 
            font-size: 14px; 
            white-space: nowrap; 
            border: 1px solid #2c2c2e; 
            color: var(--text-gray); 
            cursor: pointer;
        }
        .tab.active { 
            background: #ffffff; 
            color: #000; 
            border-color: #fff; 
            font-weight: 600; 
        }

        /* Сетка карточек (2 колонки) */
        .content-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 10px 15px 100px; 
        }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 14px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        .card-img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            background: #1c1c1e; 
        }
        .card-info { padding: 10px; }
        .price { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .title { color: var(--text-gray); font-size: 12px; }

        /* Окно с подробностями */
        #detail-view { 
            position: fixed; 
            inset: 0; 
            background: var(--bg-color); 
            z-index: 200; 
            display: none; 
            flex-direction: column; 
            overflow-y: auto; 
        }
        .back-btn { padding: 20px; color: var(--accent-blue); font-size: 17px; cursor: pointer; }
        .detail-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .detail-body { padding: 20px; }
        .detail-desc { color: var(--text-gray); line-height: 1.6; font-size: 15px; margin-top: 15px; }

        /* Кнопка внизу */
        .bottom-btn { 
            position: fixed; 
            bottom: 20px; 
            left: 15px; 
            right: 15px; 
            background: var(--accent-blue); 
            color: #fff; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 16px; 
        }
    </style>
</head>
<body>

    <div class="nav-tabs" id="tabs">
        <div class="tab active" onclick="render('all', this)">Все</div>
        <div class="tab" onclick="render('promo', this)">Акции</div>
        <div class="tab" onclick="render('tourney', this)">Турниры</div>
        <div class="tab" onclick="render('price', this)">Прайс</div>
        <div class="tab" onclick="window.open('https://t.me/qwiete', '_blank')">Админ @qwiete</div>
    </div>

    <div class="content-grid" id="main-grid"></div>

    <div id="detail-view">
        <div class="back-btn" onclick="closeDetail()">✕ Закрыть</div>
        <img class="detail-img" id="d-img">
        <div class="detail-body">
            <div class="price" id="d-price" style="font-size: 24px;"></div>
            <div class="title" id="d-title" style="font-size: 18px; color: #fff;"></div>
            <div class="detail-desc" id="d-desc"></div>
        </div>
        <button class="bottom-btn" id="d-btn" onclick="sendRequest()">Оставить заявку</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение

        // ДАННЫЕ КЛУБА (Меняй тексты и картинки здесь)
        const items = [
            { 
                category: 'promo', 
                price: '3 + 1 час', 
                title: 'Акция: Заряжай на максимум', 
                img: 'promo.jpg', 
                desc: 'Купи пакет из 3 часов и получи 4-й час в подарок! Действует ежедневно до 18:00.' 
            },
            { 
                category: 'tourney', 
                price: 'Регистрация', 
                title: 'Турнир CS2 1x1 Aim', 
                img: 'tourney.jpg', 
                desc: 'Покажи кто тут батя на аиме. Призовой фонд: 5000 бонусов. Нужен номер телефона для подтверждения.' 
            },
            { 
                category: 'price', 
                price: '500 ₽', 
                title: 'Ночной пакет Standard', 
                img: 'night.jpg', 
                desc: 'Играй всю ночь с 22:00 до 08:00. Видеокарты RTX 3060, удобные кресла.' 
            }
        ];

        // Функция отображения карточек
        function render(filter, el) {
            if(el) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            }
            const container = document.getElementById('main-grid');
            container.innerHTML = '';
            const filtered = filter === 'all' ? items : items.filter(i => i.category === filter);
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => showDetail(item);
                div.innerHTML = `
                    <img src="${item.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x400/1c1c1e/fff?text=CyberClub'">
                    <div class="card-info">
                        <div class="price">${item.price}</div>
                        <div class="title">${item.title}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Открытие карточки
        function showDetail(item) {
            document.getElementById('d-img').src = item.img;
            document.getElementById('d-price').innerText = item.price;
            document.getElementById('d-title').innerText = item.title;
            document.getElementById('d-desc').innerText = item.desc;
            document.getElementById('detail-view').style.display = 'flex';
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
        }

        // ОТПРАВКА ДАННЫХ И АВТОРИЗАЦИЯ
   function sendRequest() {
    const title = document.getElementById('d-title').innerText;
    
    // Кодируем название турнира, чтобы в ссылке не было пробелов
    const encodedTitle = encodeURIComponent(title);
    
    // Ссылка на твоего бота. Замени Colizeum_Club_bot на свой юзернейм бота
    const botUsername = "Colizeum_Club_bot"; 
    const url = `https://t.me/${botUsername}?start=reg_${encodedTitle}`;

    tg.showConfirm(`Перейти в чат с ботом для завершения регистрации на "${title}"?`, (confirmed) => {
        if (confirmed) {
            tg.openTelegramLink(url); // Открывает чат с ботом
            tg.close(); // Закрывает Mini App
        }
    });
}
        // Инициализация
        render('all');
    </script>
</body>
</html>
