<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Club App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-gray: #8e8e93;
            --accent-blue: #007aff;
        }

        body { background: var(--bg-color); color: var(--text-main); font-family: -apple-system, system-ui; margin: 0; padding: 0; }

        /* Навигация */
        .nav-tabs { display: flex; gap: 8px; padding: 15px; overflow-x: auto; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 100; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        
        .tab { background: #1c1c1e; padding: 10px 18px; border-radius: 22px; font-size: 14px; white-space: nowrap; border: 1px solid #2c2c2e; transition: 0.2s; color: var(--text-gray); }
        .tab.active { background: #ffffff; color: #000; border-color: #fff; font-weight: 600; }

        /* Сетка как в ТГ */
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 15px 100px; }
        
        .card { background: var(--card-bg); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #1c1c1e; }
        .card-info { padding: 10px; }
        .price { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .title { color: var(--text-gray); font-size: 12px; line-height: 1.3; }

        /* Окно деталей */
        #detail-view { position: fixed; inset: 0; background: var(--bg-color); z-index: 200; display: none; flex-direction: column; overflow-y: auto; }
        .back-btn { padding: 20px; color: var(--accent-blue); font-size: 17px; cursor: pointer; font-weight: 500; }
        .detail-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .detail-body { padding: 20px; }
        .detail-desc { color: var(--text-gray); line-height: 1.6; font-size: 15px; margin-top: 15px; }

        .bottom-btn { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--accent-blue); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 600; font-size: 16px; box-shadow: 0 10px 20px rgba(0,122,255,0.3); }
    </style>
</head>
<body>

    <div class="nav-tabs" id="tabs">
        <div class="tab active" onclick="render('all', this)">Все</div>
        <div class="tab" onclick="render('promo', this)">Акции</div>
        <div class="tab" onclick="render('tourney', this)">Турниры</div>
        <div class="tab" onclick="render('price', this)">Прайс и тарифы</div>
        <div class="tab" onclick="window.open('https://t.me/твой_ник_админа')">Написать админу</div>
    </div>

    <div class="content-grid" id="main-grid"></div>

    <div id="detail-view">
        <div class="back-btn" onclick="closeDetail()">✕ Закрыть</div>
        <img class="detail-img" id="d-img">
        <div class="detail-body">
            <div class="price" id="d-price" style="font-size: 24px;"></div>
            <div class="title" id="d-title" style="font-size: 18px; color: #fff;"></div>
            <div class="detail-desc" id="d-desc"></div>
        </div>
        <button class="bottom-btn" id="d-btn" onclick="sendToBot()">Оставить заявку</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ТУТ ЗАПОЛНЯЙ СВОИ ДАННЫЕ
        const items = [
            { 
                category: 'promo', 
                price: '3 + 1 бесплатно', 
                title: 'Акция на будни', 
                img: 'https://via.placeholder.com/400x400/1c1c1e/fff?text=PROMO', // Замени на ссылку на фото
                desc: 'При покупке 3 часов игрового времени, 4-й час вы получаете в подарок. Акция действует с понедельника по четверг.' 
            },
            { 
                category: 'tourney', 
                price: 'Приз 5000₽', 
                title: 'CS2 1x1 Aim Map', 
                img: 'https://via.placeholder.com/400x400/1c1c1e/fff?text=CS2', 
                desc: 'Турнир для настоящих снайперов. Регистрация до субботы. Начало в 14:00.' 
            },
            { 
                category: 'price', 
                price: '100 ₽ / час', 
                title: 'Общий зал', 
                img: 'https://via.placeholder.com/400x400/1c1c1e/fff?text=PC', 
                desc: 'Видеокарты RTX 3060, мониторы 144Гц. Комфортные кресла и девайсы HyperX.' 
            }
        ];

        function render(filter, el) {
            // Подсветка таба
            if(el) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            }

            const container = document.getElementById('main-grid');
            container.innerHTML = '';
            
            const filtered = filter === 'all' ? items : items.filter(i => i.category === filter);
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => showDetail(item);
                div.innerHTML = `
                    <img src="${item.img}" class="card-img">
                    <div class="card-info">
                        <div class="price">${item.price}</div>
                        <div class="title">${item.title}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function showDetail(item) {
            document.getElementById('d-img').src = item.img;
            document.getElementById('d-price').innerText = item.price;
            document.getElementById('d-title').innerText = item.title;
            document.getElementById('d-desc').innerText = item.desc;
            
            // Если это не турнир, можно скрыть кнопку или изменить текст
            const btn = document.getElementById('d-btn');
            btn.innerText = item.category === 'tourney' ? 'Записаться на турнир' : 'Узнать наличие мест';
            
            document.getElementById('detail-view').style.display = 'flex';
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
        }

        function sendToBot() {
            const title = document.getElementById('d-title').innerText;
            tg.sendData("Заявка: " + title);
            tg.close();
        }

        // Первый запуск
        render('all');
    </script>
</body>
</html>
