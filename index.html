<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Club</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-gray: #8e8e93;
            --accent-blue: #007aff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Навигация сверху */
        .nav-tabs {
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .tab {
            background: #1c1c1e;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #2c2c2e;
        }

        .tab.active {
            background: #ffffff;
            color: #000;
        }

        /* Сетка карточек */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 15px 100px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-info {
            padding: 12px;
        }

        .price {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .title {
            color: var(--text-gray);
            font-size: 13px;
        }

        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #32d74b;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Детальное окно (Modal) */
        #detail-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 20;
            display: none;
            flex-direction: column;
        }

        .back-btn {
            padding: 15px;
            color: var(--accent-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .detail-content {
            padding: 20px;
        }

        .main-action-btn {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="tab active" onclick="filter('all')">Все</div>
        <div class="tab" onclick="filter('promo')">Акции</div>
        <div class="tab" onclick="filter('tourney')">Турниры</div>
        <div class="tab" onclick="filter('pc')">Забронировать</div>
    </div>

    <div class="content-grid" id="main-grid">
        <div class="card" onclick="showDetail('Ночной пакет', '500 ₽', 'С 22:00 до 08:00. Все VIP-места включены. Отличное железо и топовая атмосфера.')">
            <div class="badge">New</div>
            <div class="card-img">🎮</div>
            <div class="card-info">
                <div class="price">500 ₽</div>
                <div class="title">Ночной пакет</div>
            </div>
        </div>
        <div class="card" onclick="showDetail('Dota 2 Mixed', 'Участие: 0 ₽', 'Турнир 5х5. Призовой фонд 10.000 бонусов на баланс.')">
            <div class="card-img">🏆</div>
            <div class="card-info">
                <div class="price">Турнир</div>
                <div class="title">Dota 2 Mixed</div>
            </div>
        </div>
    </div>

    <div id="detail-view">
        <div class="back-btn" onclick="closeDetail()">‹ Назад</div>
        <div class="card-img" style="aspect-ratio: 16/9; font-size: 50px;" id="detail-img">🖼️</div>
        <div class="detail-content">
            <h1 id="detail-title" style="margin: 0 0 10px 0;"></h1>
            <div id="detail-price" style="font-size: 20px; font-weight: bold; margin-bottom: 20px;"></div>
            <p id="detail-desc" style="color: var(--text-gray); line-height: 1.5;"></p>
        </div>
        <button class="main-action-btn" id="action-btn" onclick="sendAction()">Записаться</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showDetail(title, price, desc) {
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-price').innerText = price;
            document.getElementById('detail-desc').innerText = desc;
            document.getElementById('detail-view').style.display = 'flex';
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
        }

        function sendAction() {
            const title = document.getElementById('detail-title').innerText;
            tg.sendData("Заявка: " + title);
            tg.close();
        }
        
        // Переключение табов
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelector('.tab.active').classList.remove('active');
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
